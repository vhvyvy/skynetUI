name: Sync Notion → DB
on:
  schedule:
    - cron: '0 0,8,16 * * *'  # 00:00, 08:00, 16:00 UTC (3 раза в сутки)
  workflow_dispatch:
    inputs:
      truncate_transactions:
        description: 'Очистить transactions перед sync (убрать дубликаты)'
        required: false
        default: false
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/sync_notion_full.py ${{ github.event.inputs.truncate_transactions == 'true' && '--truncate-transactions' || '' }}
        env:
          PG_HOST: ${{ secrets.PG_HOST }}
          PG_PORT: ${{ secrets.PG_PORT }}
          PG_DB: ${{ secrets.PG_DB }}
          PG_USER: ${{ secrets.PG_USER }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          # Для личной версии используй NOTION_TOKEN, для клиентской — NOTION_TOKEN_CLIENT.
          # Скрипт сам возьмёт токен в порядке: NOTION_TOKEN → NOTION_TOKEN_CLIENT → NOTION_API_KEY.
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TOKEN_CLIENT: ${{ secrets.NOTION_TOKEN_CLIENT }}
