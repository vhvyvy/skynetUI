name: Sync Notion → DB
on:
  schedule:
    - cron: '0 0,8,16 * * *'  # 00:00, 08:00, 16:00 UTC (3 раза в сутки)
  workflow_dispatch:
    inputs:
      truncate_transactions:
        description: 'Очистить transactions перед sync (убрать дубликаты)'
        required: false
        default: false
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/sync_notion_full.py ${{ github.event.inputs.truncate_transactions == 'true' && '--truncate-transactions' || '' }}
        env:
          # Для клиентской версии можно задать отдельные секреты PG_*_CLIENT и NOTION_TOKEN_CLIENT.
          # Скрипт берёт значения в порядке PG_*_CLIENT → PG_* → DB_*.
          PG_HOST: ${{ secrets.PG_HOST }}
          PG_HOST_CLIENT: ${{ secrets.PG_HOST_CLIENT }}
          PG_PORT: ${{ secrets.PG_PORT }}
          PG_PORT_CLIENT: ${{ secrets.PG_PORT_CLIENT }}
          PG_DB: ${{ secrets.PG_DB }}
          PG_DB_CLIENT: ${{ secrets.PG_DB_CLIENT }}
          PG_USER: ${{ secrets.PG_USER }}
          PG_USER_CLIENT: ${{ secrets.PG_USER_CLIENT }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          PG_PASSWORD_CLIENT: ${{ secrets.PG_PASSWORD_CLIENT }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TOKEN_CLIENT: ${{ secrets.NOTION_TOKEN_CLIENT }}
          NOTION_EXPENSES_DATABASE_IDS: ${{ secrets.NOTION_EXPENSES_DATABASE_IDS }}
          NOTION_EXPENSES_DATABASE_IDS_CLIENT: ${{ secrets.NOTION_EXPENSES_DATABASE_IDS_CLIENT }}
          NOTION_TRANSACTIONS_DATABASE_ID: ${{ secrets.NOTION_TRANSACTIONS_DATABASE_ID }}
          NOTION_TRANSACTIONS_DATABASE_ID_CLIENT: ${{ secrets.NOTION_TRANSACTIONS_DATABASE_ID_CLIENT }}
